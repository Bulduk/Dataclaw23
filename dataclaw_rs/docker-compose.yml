version: '3.8'

services:
  dataclaw_rust_engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataclaw_rust_executor
    restart: always
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=${DATABASE_URL}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    env_file:
      - .env
    networks:
      - dataclaw_net

networks:
  dataclaw_net:
    driver: bridge
